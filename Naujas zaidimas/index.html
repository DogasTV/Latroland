<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LATROLAND Monopolis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cards.css">
    <link rel="stylesheet" href="center.css">
    <style>
        .disabled-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10002;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }
        .disabled-overlay p {
            background: #1b4d1b;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #ffd700;
        }
        .link-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1b4d1b;
            padding: 25px;
            border-radius: 20px;
            border: 3px solid #ffd700;
            z-index: 20000;
            text-align: center;
            min-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .link-modal h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 24px;
        }
        .link-modal p {
            color: #ccc;
            margin: 10px 0;
        }
        .link-modal input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: #0d2b0d;
            color: #ffd700;
            text-align: center;
            font-size: 12px;
        }
        .link-modal button {
            padding: 8px 20px;
            margin: 5px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .copy-btn {
            background: #ffd700;
            color: #8b0000;
        }
        .close-btn {
            background: #8b0000;
            color: #ffd700;
        }
        .copy-btn:hover, .close-btn:hover {
            transform: scale(1.02);
        }
        
        /* ========== REŽIMO PASIRINKIMO MODALAS ========== */
        .difficulty-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20010;
        }
        .difficulty-modal-content {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 3px solid #ffd700;
            min-width: 400px;
        }
        .difficulty-modal-content h2 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .difficulty-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .difficulty-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .difficulty-btn.easy {
            background: #4caf50;
            color: white;
            box-shadow: 0 4px 0 #2e7d32;
        }
        .difficulty-btn.medium {
            background: #ff9800;
            color: white;
            box-shadow: 0 4px 0 #c66900;
        }
        .difficulty-btn.hard {
            background: #f44336;
            color: white;
            box-shadow: 0 4px 0 #b71c1c;
        }
        .difficulty-btn:hover {
            transform: scale(1.05);
        }
        .difficulty-btn:active {
            transform: translateY(2px);
        }
        .difficulty-info {
            margin-top: 20px;
            padding: 15px;
            background: #0d2b0d;
            border-radius: 15px;
            text-align: left;
        }
        .difficulty-info p {
            color: #ffd700;
            margin: 5px 0;
            font-size: 12px;
        }
        .difficulty-info p.easy { color: #4caf50; }
        .difficulty-info p.medium { color: #ff9800; }
        .difficulty-info p.hard { color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; margin-bottom: 20px;">🎲 LATROLAND MONOPOLIS 🎲</h1>
        <div class="game-layout">
            <div class="game-board-wrapper">
                <div id="floatingCardsContainer" style="position: relative; width: 100%; height: 100%;"></div> 
                <div class="game-board" id="gameBoard"></div>
            </div>
        </div>
    </div>

    <div id="loginScreen" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1b4d1b; padding: 30px; border-radius: 20px; border: 3px solid #ffd700; z-index: 10000; text-align: center;">
        <h2 style="color: #ffd700;">🎲 LATROLAND MONOPOLIS 🎲</h2>
        <div style="display: flex; gap: 20px; margin: 20px 0; justify-content: center;">
            <button id="createGameBtn" style="background: #ffd700; color: #8b0000; padding: 15px 30px; font-size: 18px; font-weight: bold; border: none; border-radius: 20px;">🆕 SUKURTI NAUJĄ STALĄ</button>
            <button id="joinExistingBtn" style="background: #2e7d32; color: #ffd700; padding: 15px 30px; font-size: 18px; font-weight: bold; border: none; border-radius: 20px;">🔗 PRISIJUNGTI PRIE STALO</button>
        </div>
        <div id="joinForm" style="display: none;">
            <input type="text" id="joinGameId" placeholder="Stalo kodas...">
            <input type="text" id="joinPlayerName" placeholder="Tavo vardas...">
            <br>
            <button id="confirmJoinBtn" style="background: #ffd700; color: #8b0000; padding: 10px 20px; margin: 10px; border: none; border-radius: 20px;">PRISIJUNGTI</button>
            <button id="cancelJoinBtn" style="background: #8b0000; color: #ffd700; padding: 10px 20px; margin: 10px; border: none; border-radius: 20px;">ATŠAUKTI</button>
        </div>
    </div>

    <!-- REŽIMO PASIRINKIMO MODALAS (iš pradžių paslėptas) -->
    <div id="difficultyModal" class="difficulty-modal" style="display: none;">
        <div class="difficulty-modal-content">
            <h2>🎲 PASIRINKITE SUDĖTINGUMĄ 🎲</h2>
            <div class="difficulty-buttons">
                <button id="easyMode" class="difficulty-btn easy">🟢 LENGVAS</button>
                <button id="mediumMode" class="difficulty-btn medium">🟡 VIDUTINIS</button>
                <button id="hardMode" class="difficulty-btn hard">🔴 SUNKUS</button>
            </div>
            <div class="difficulty-info">
                <p class="easy">🟢 Lengvas: ×2, ×4, ×6, ×8, ×10 (šeimyninis)</p>
                <p class="medium">🟡 Vidutinis: ×5, ×10, ×15, ×20, ×25 (klasikinis)</p>
                <p class="hard">🔴 Sunkus: ×10, ×20, ×30, ×40, ×50 (tikras Monopolis)</p>
            </div>
        </div>
    </div>

    <div id="tableInfo" style="position: fixed; top: 20px; right: 20px; background: #1b4d1b; border: 2px solid #ffd700; border-radius: 15px; padding: 10px 15px; color: #ffd700; font-size: 12px; z-index: 9999; text-align: center; min-width: 180px;">
        <strong>🎲 STALO INFO</strong><br>
        📋 Kodas: <span id="infoGameCode">---</span><br>
        👥 Žaidėjai: <span id="infoPlayerCount">0</span>/6<br>
        🎮 Režimas: <span id="infoDifficulty">---</span><br>
        <div id="infoPlayersList" style="font-size: 10px; margin-top: 5px; color: #ccc;"></div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <!-- Žaidimo duomenys (pirmas) -->
    <script src="gameData.js"></script>
    
    <!-- Pagalbiniai failai -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/log.js"></script>
    
    <!-- Pagrindinės sistemos -->
    <script src="js/pawnSystem.js"></script>
    <script src="js/bankruptcy.js"></script>
    <script src="js/corners.js"></script>

    <!-- Kortelės ir kauliukai -->
    <script src="js/cards.js"></script>

    <!-- Lenta ir valdymas -->
    <script src="js/board.js"></script>

    <script src="js/saveLoad.js"></script>

    <!-- Firebase sinchronizacija (po visų, bet prieš trade) -->
    <script src="js/firebaseSync.js"></script>
    
    <!-- Prekyba (paskutinis, kad gautų visas funkcijas) -->
    <script src="js/trade.js"></script>

    <!-- Login logika -->
    <script>
        let gameStarted = false;
        window.joinMode = false;
        let selectedDifficulty = 'medium';
        let pendingPlayerName = null;
        
        function setGameActive(active) {
            gameStarted = active;
            if (active) {
                const overlay = document.getElementById('gameDisabledOverlay');
                if (overlay) overlay.remove();
                window.waitingForRoll = true;
                console.log("🎮 Žaidimas aktyvuotas!");
            } else {
                if (!document.getElementById('gameDisabledOverlay') && window.gameId) {
                    const overlay = document.createElement('div');
                    overlay.id = 'gameDisabledOverlay';
                    overlay.className = 'disabled-overlay';
                    overlay.innerHTML = '<p>⏳ LAUKIAME KOL ŠEIMININKAS PRADĖS ŽAIDIMĄ...</p>';
                    document.body.appendChild(overlay);
                }
                window.waitingForRoll = false;
            }
        }
        
        let tableInfoListener = null;
        
        function updateTableInfo(gameId) {
            if (!gameId) return;
            
            const gameRef = window.database.ref('games/' + gameId);
            if (tableInfoListener) {
                gameRef.off('value', tableInfoListener);
            }
            
            tableInfoListener = (snapshot) => {
                const game = snapshot.val();
                if (game && game.players) {
                    document.getElementById('infoGameCode').innerText = gameId;
                    document.getElementById('infoPlayerCount').innerText = game.players.length;
                    document.getElementById('infoDifficulty').innerText = 
                        game.difficulty === 'easy' ? '🟢 LENGVAS' : 
                        game.difficulty === 'hard' ? '🔴 SUNKUS' : '🟡 VIDUTINIS';
                    let playersHtml = '';
                    game.players.forEach((p) => {
                        playersHtml += `<div>${p.figure} ${p.name} ${p.id === 0 ? '👑' : ''}</div>`;
                    });
                    if (playersHtml === '') playersHtml = '<div>🚫 Nėra žaidėjų</div>';
                    document.getElementById('infoPlayersList').innerHTML = playersHtml;
                }
                if (game && game.status === 'playing' && !gameStarted) {
                    setGameActive(true);
                    if (typeof window.initSync === 'function') {
                        window.initSync();
                    }
                }
            };
            
            gameRef.on('value', tableInfoListener);
        }
        
        function addPlayerToGame(gameId, playerName, isHost) {
            const playersRef = window.database.ref('games/' + gameId + '/players');
            playersRef.once('value').then(snapshot => {
                let players = snapshot.val() || [];
                
                const existingPlayer = players.find(p => p.name === playerName);
                if (existingPlayer) {
                    console.log("👤 Žaidėjas jau egzistuoja:", existingPlayer);
                    document.getElementById('loginScreen').style.display = 'none';
                    if (existingPlayer.id === 0) {
                        addHostButtons(gameId);
                        setGameActive(true);
                    } else {
                        setGameActive(false);
                        if (typeof window.initSync === 'function') {
                            window.initSync();
                        }
                    }
                    return;
                }
                
                if (players.length >= 6) {
                    alert("Stalas jau pilnas (6 žaidėjai)!");
                    return;
                }
                
                const figures = ['🚗', '🐕', '👞', '⛵', '🎩', '🐱'];
                const newId = players.length;
                const newPlayer = {
                    id: newId,
                    name: playerName,
                    money: 1500,
                    position: 1,
                    figure: figures[newId],
                    figureName: ['Automobilis', 'Šuniukas', 'Batas', 'Laivas', 'Skrybėlė', 'Katė'][newId],
                    connected: true,
                    online: true,
                    properties: [],
                    houses: {},
                    pledgedProperties: [],
                    bankrupt: false
                };
                players.push(newPlayer);
                playersRef.set(players);
                
                localStorage.setItem(`player_${gameId}`, playerName);
                localStorage.setItem(`playerId_${gameId}`, newId);
                window.gameId = gameId;
                
                document.getElementById('loginScreen').style.display = 'none';
                
                if (isHost || newId === 0) {
                    addHostButtons(gameId);
                    setGameActive(true);
                } else {
                    setGameActive(false);
                    if (typeof window.initSync === 'function') {
                        window.initSync();
                    }
                }
                
                console.log("✅ Prisijungė žaidėjas:", newPlayer);
            }).catch(error => {
                console.error("Klaida:", error);
                alert("Klaida prisijungiant: " + error.message);
            });
        }
        
        function addHostButtons(gameId) {
            if (document.getElementById('startGameBtn')) return;
            
            const startBtn = document.createElement('button');
            startBtn.id = 'startGameBtn';
            startBtn.innerText = '🎮 PRADĖTI ŽAIDIMĄ';
            startBtn.style.cssText = 'position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #8b0000; padding: 15px 30px; font-size: 20px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; z-index: 10001; box-shadow: 0 5px 0 #b8860b;';
            startBtn.onclick = () => {
                if (!confirm("🎮 Ar tikrai pradėti žaidimą?")) return;
                window.database.ref('games/' + gameId).update({ 
                    status: 'playing',
                    startTime: Date.now()
                }).then(() => {
                    setGameActive(true);
                    if (typeof window.initSync === 'function') {
                        window.initSync();
                    }
                });
                startBtn.remove();
                resetBtn.remove();
            };
            document.body.appendChild(startBtn);
            
            const resetBtn = document.createElement('button');
            resetBtn.id = 'resetGameBtn';
            resetBtn.innerText = '🔄 RESET STALĄ (išvalyti žaidėjus)';
            resetBtn.style.cssText = 'position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #8b0000; color: #ffd700; padding: 15px 30px; font-size: 20px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; z-index: 10001; box-shadow: 0 5px 0 #5a0000;';
            resetBtn.onclick = () => {
                if (!confirm("⚠️ AR TIKRAI RESET? Bus ištrinti VISI žaidėjai!")) return;
                window.database.ref('games/' + gameId).update({ 
                    players: [], 
                    currentPlayer: 0, 
                    status: 'waiting' 
                }).then(() => {
                    localStorage.removeItem(`player_${gameId}`);
                    localStorage.removeItem(`playerId_${gameId}`);
                    alert("✅ Stalas išvalytas! Puslapis bus atnaujintas.");
                    location.reload();
                });
            };
            document.body.appendChild(resetBtn);
        }
        
        function showDifficultyModal() {
            const modal = document.getElementById('difficultyModal');
            modal.style.display = 'flex';
        }
        
        function hideDifficultyModal() {
            const modal = document.getElementById('difficultyModal');
            modal.style.display = 'none';
        }
        
        function createGameWithDifficulty(difficulty, playerName) {
            selectedDifficulty = difficulty;
            const newGameId = Math.random().toString(36).substring(2, 8).toUpperCase();
            const url = `${window.location.origin}${window.location.pathname}?game=${newGameId}`;
            
            window.database.ref('games/' + newGameId).set({ 
                players: [], 
                currentPlayer: 0, 
                status: 'waiting',
                difficulty: difficulty,
                inviter: playerName,
                created: Date.now()
            }).then(() => {
                const modal = document.createElement('div');
                modal.className = 'link-modal';
                modal.innerHTML = `
                    <h3>✅ STALAS SUKURTAS!</h3>
                    <p>🎮 Sudėtingumas: <strong>${difficulty === 'easy' ? '🟢 LENGVAS' : difficulty === 'hard' ? '🔴 SUNKUS' : '🟡 VIDUTINIS'}</strong></p>
                    <p>📋 Stalo kodas: <strong>${newGameId}</strong></p>
                    <p>🔗 Nuoroda:</p>
                    <input type="text" id="linkInput" value="${url}" readonly>
                    <div>
                        <button id="copyLinkBtn" class="copy-btn">📋 KOPIJUOTI</button>
                        <button id="closeModalBtn" class="close-btn">✖ UŽDARYTI</button>
                    </div>
                `;
                document.body.appendChild(modal);
                
                document.getElementById('copyLinkBtn').onclick = () => {
                    const input = document.getElementById('linkInput');
                    input.select();
                    navigator.clipboard.writeText(input.value);
                    alert("✅ Nuoroda nukopijuota!");
                };
                
                document.getElementById('closeModalBtn').onclick = () => {
                    modal.remove();
                    window.history.pushState({}, "", `?game=${newGameId}`);
                    window.gameId = newGameId;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('infoGameCode').innerText = newGameId;
                    document.getElementById('infoDifficulty').innerText = 
                        difficulty === 'easy' ? '🟢 LENGVAS' : difficulty === 'hard' ? '🔴 SUNKUS' : '🟡 VIDUTINIS';
                    updateTableInfo(newGameId);
                    addPlayerToGame(newGameId, playerName, true);
                    
                    if (typeof setDifficulty === 'function') {
                        setDifficulty(difficulty);
                    }
                };
            }).catch(error => {
                console.error("Klaida kuriant stalą:", error);
                alert("Klaida kuriant stalą: " + error.message);
            });
        }
        
        // REŽIMO PASIRINKIMO LOGIKA
        document.getElementById('createGameBtn').onclick = () => {
            if (window.joinMode) {
                alert("Pirmiausia grįžkite atgal (paspauskite GRĮŽTI)!");
                return;
            }
            
            const playerName = prompt("Įveskite savo vardą:", "Šeimininkas");
            if (!playerName) return;
            
            pendingPlayerName = playerName;
            showDifficultyModal();
        };
        
        document.getElementById('easyMode').onclick = () => {
            hideDifficultyModal();
            createGameWithDifficulty('easy', pendingPlayerName);
        };
        
        document.getElementById('mediumMode').onclick = () => {
            hideDifficultyModal();
            createGameWithDifficulty('medium', pendingPlayerName);
        };
        
        document.getElementById('hardMode').onclick = () => {
            hideDifficultyModal();
            createGameWithDifficulty('hard', pendingPlayerName);
        };
        
        // Prisijungimo logika
        document.getElementById('joinExistingBtn').onclick = () => {
            window.joinMode = true;
            document.getElementById('createGameBtn').style.display = 'none';
            document.getElementById('joinExistingBtn').style.display = 'none';
            document.getElementById('joinForm').style.display = 'block';
            
            const backBtn = document.createElement('button');
            backBtn.id = 'backToMenuBtn';
            backBtn.innerText = '🔙 GRĮŽTI';
            backBtn.style.cssText = 'background: #8b0000; color: #ffd700; padding: 10px 20px; margin-top: 15px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer;';
            backBtn.onclick = () => {
                window.joinMode = false;
                document.getElementById('createGameBtn').style.display = 'block';
                document.getElementById('joinExistingBtn').style.display = 'block';
                document.getElementById('joinForm').style.display = 'none';
                backBtn.remove();
            };
            document.getElementById('loginScreen').appendChild(backBtn);
        };
        
        document.getElementById('confirmJoinBtn').onclick = () => {
            let gameId = document.getElementById('joinGameId').value.trim().toUpperCase();
            const playerName = document.getElementById('joinPlayerName').value.trim();
            
            const urlParams = new URLSearchParams(window.location.search);
            const gameIdFromUrl = urlParams.get('game');
            if (gameIdFromUrl && !gameId) {
                gameId = gameIdFromUrl;
            }
            
            if (!gameId || !playerName) {
                alert("Įveskite stalo kodą ir savo vardą!");
                return;
            }
            
            window.database.ref('games/' + gameId).once('value').then(snapshot => {
                if (!snapshot.exists()) {
                    alert("Stalas su tokiu kodu neegzistuoja!");
                    return;
                }
                const game = snapshot.val();
                if (game.difficulty && typeof setDifficulty === 'function') {
                    setDifficulty(game.difficulty);
                }
                window.location.href = `${window.location.pathname}?game=${gameId}`;
            });
        };
        
        document.getElementById('cancelJoinBtn').onclick = () => {
            window.joinMode = false;
            document.getElementById('createGameBtn').style.display = 'block';
            document.getElementById('joinExistingBtn').style.display = 'block';
            document.getElementById('joinForm').style.display = 'none';
            const backBtn = document.getElementById('backToMenuBtn');
            if (backBtn) backBtn.remove();
        };
        
        // Patikriname ar jau yra game ID URL
        const urlGameId = new URLSearchParams(location.search).get('game');
        if (urlGameId) {
            window.gameId = urlGameId;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('infoGameCode').innerText = urlGameId;
            updateTableInfo(urlGameId);
            
            // Gauname režimą iš Firebase
            window.database.ref('games/' + urlGameId).once('value').then(snapshot => {
                const game = snapshot.val();
                if (game && game.difficulty) {
                    document.getElementById('infoDifficulty').innerText = 
                        game.difficulty === 'easy' ? '🟢 LENGVAS' : 
                        game.difficulty === 'hard' ? '🔴 SUNKUS' : '🟡 VIDUTINIS';
                    if (typeof setDifficulty === 'function') {
                        setDifficulty(game.difficulty);
                    }
                }
            });
            
            const savedPlayer = localStorage.getItem(`player_${urlGameId}`);
            if (savedPlayer) {
                addPlayerToGame(urlGameId, savedPlayer, false);
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('loginScreen').innerHTML = `
                    <h2 style="color: #ffd700;">🔗 PRISIJUNGIMAS PRIE STALO</h2>
                    <p style="color: #ffd700;">Stalo kodas: <strong>${urlGameId}</strong></p>
                    <input type="text" id="joinPlayerName" placeholder="Tavo vardas..." style="padding: 10px; margin: 10px 0; width: 200px; border-radius: 10px; border: none;">
                    <br>
                    <button id="confirmJoinBtn2" style="background: #ffd700; color: #8b0000; padding: 10px 20px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer;">PRISIJUNGTI</button>
                `;
                document.getElementById('confirmJoinBtn2').onclick = () => {
                    const playerName = document.getElementById('joinPlayerName').value.trim();
                    if (playerName) {
                        addPlayerToGame(urlGameId, playerName, false);
                    } else {
                        alert("Įveskite vardą!");
                    }
                };
            }
        }
    </script>
